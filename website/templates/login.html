{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="form-container">
    <form method="POST">
        <h2 class="brand-text text-center mb-4">Welcome Back</h2>
        <div class="form-group">
            <label for="email">Email Address</label>
            <input 
                type="email" 
                class="form-control" 
                id="email" 
                name="email"
                placeholder="Enter email"/>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input 
                type="password" 
                class="form-control" 
                id="password" 
                name="password"
                placeholder="Enter password"/>
        </div>
        <br />
        <button type="submit" class="btn btn-primary btn-block">Login</button>
        <div class="mt-3 text-center">
            <small class="text-muted">Don't have an account? <a href="/sign-up">Sign Up</a></small>
        </div>
    </form>
</div>
{% endblock %}
