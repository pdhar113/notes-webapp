{% extends "base.html" %}
{% block title %}500 - Server Error{% endblock %}
{% block content %}
<div class="container text-center py-5">
    <div class="form-container">
        <h1 class="brand-text" style="font-size: 5rem; color: #ef4444;">500</h1>
        <h2 class="mb-4">Internal Server Error</h2>
        <p class="text-muted mb-4">Something went wrong on our end. We're working on fixing it. Please try again later.</p>
        <a href="/" class="btn btn-primary">
            <i class="fa fa-refresh mr-1"></i> Try Again
        </a>
    </div>
</div>
{% endblock %}
